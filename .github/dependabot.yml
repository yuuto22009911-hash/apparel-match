version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    groups:
      # 関連パッケージはまとめて1PRに（ノイズ削減）
      next-ecosystem:
        patterns:
          - next
          - eslint-config-next
          - "@next/*"
      react-ecosystem:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      supabase:
        patterns:
          - "@supabase/*"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/react"
          - "@types/react-dom"
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
